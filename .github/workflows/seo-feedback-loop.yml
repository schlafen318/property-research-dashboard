name: SEO feedback loop

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: seo-feedback-loop
  cancel-in-progress: false

jobs:
  feedback-loop:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GOOGLE_SEARCH_CONSOLE_TOKEN_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_TOKEN_JSON }}
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth google-auth-httplib2

      - name: Validate required secrets
        run: |
          if [ -z "$GOOGLE_SEARCH_CONSOLE_TOKEN_JSON" ]; then
            echo "GOOGLE_SEARCH_CONSOLE_TOKEN_JSON is required for the SEO feedback loop." >&2
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate SEO monitor report
        run: python3 scripts/seo_monitor.py --write --submit-sitemap --json-output output/seo/latest.json

      - name: Submit URLs to IndexNow
        run: python3 scripts/indexnow_submit.py --write --output output/seo/indexnow-latest.json --allow-failure

      - name: Generate SEO status dashboard
        run: python3 scripts/seo_status_dashboard.py --report output/seo/latest.json --indexnow-report output/seo/indexnow-latest.json --output artifacts/seo-status/index.html

      - name: Verify tracking coverage
        run: python3 codex-skills/global-home-atlas-analytics/scripts/verify_tracking.py

      - name: Run feedback loop
        run: python3 scripts/seo_feedback_loop.py --apply

      - name: Commit SEO status dashboard
        run: |
          git add artifacts/seo-status/index.html
          if git diff --cached --quiet; then
            echo "SEO status dashboard unchanged."
          else
            git commit -m "Update SEO status dashboard"
            git push
            gh workflow run "Deploy static dashboard" --ref main
          fi

      - name: Upload SEO reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-monitor-report
          path: |
            output/seo/*.md
            output/seo/*.json
          if-no-files-found: warn
